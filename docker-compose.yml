services:
  mgcompliance:
    build: .
    container_name: mgcompliance
    ports:
      - "${PORT:-5100}:5100"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mgcompliance}:${POSTGRES_PASSWORD:-mgcompliance}@db:5432/${POSTGRES_DB:-mgcompliance}
    volumes:
      - compliance-data:/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17
    container_name: mgcompliance-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mgcompliance}
      POSTGRES_USER: ${POSTGRES_USER:-mgcompliance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mgcompliance}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mgcompliance}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  compliance-data:
