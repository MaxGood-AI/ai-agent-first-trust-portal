services:
  trust-portal:
    build: .
    container_name: trust-portal
    ports:
      - "${PORT:-5100}:5100"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-trust_portal}:${POSTGRES_PASSWORD:-trust_portal}@db:5432/${POSTGRES_DB:-trust_portal}
    volumes:
      - compliance-data:/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17
    container_name: trust-portal-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trust_portal}
      POSTGRES_USER: ${POSTGRES_USER:-trust_portal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trust_portal}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trust_portal}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  compliance-data:
