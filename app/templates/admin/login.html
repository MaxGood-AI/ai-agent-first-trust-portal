{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 80px auto;">
    <h1>Admin Login</h1>
    <p>Paste your API key to access the admin dashboard.</p>

    {% if error %}
    <div class="flash error" style="padding: 10px; margin-bottom: 16px; background: #fee; border: 1px solid #c00; border-radius: 4px;">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        <div style="margin-bottom: 12px;">
            <label for="api_key" style="display: block; margin-bottom: 4px; font-weight: bold;">API Key</label>
            <input type="password" id="api_key" name="api_key" required
                   style="width: 100%; padding: 8px; font-family: monospace; box-sizing: border-box;"
                   placeholder="Paste your API key here">
        </div>
        <button type="submit" style="padding: 8px 24px; cursor: pointer;">Log In</button>
    </form>
</div>
{% endblock %}
