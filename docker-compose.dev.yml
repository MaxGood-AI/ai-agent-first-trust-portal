services:
  trust-portal:
    build: .
    container_name: trust-portal-dev
    ports:
      - "5100:5100"
    volumes:
      - .:/app
      - ${COMPLIANCE_DATA_DIR:-.}:/data
    env_file:
      - .env
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://trust_portal:password@db:5432/trust_portal
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "alembic upgrade head &&
               flask run --host=0.0.0.0 --port=5100 --reload"

  db:
    image: postgres:17
    container_name: trust-portal-db
    environment:
      POSTGRES_DB: trust_portal
      POSTGRES_USER: trust_portal
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trust_portal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
